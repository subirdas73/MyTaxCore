<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaxCore Admin Dashboard</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#f4f7fb;
}

.header{
background:#0d6efd;
color:#fff;
padding:18px;
text-align:center;
font-size:24px;
font-weight:bold;
}

.container{
max-width:900px;
margin:30px auto;
padding:20px;
}

.card{
background:#fff;
padding:20px;
margin-bottom:20px;
border-radius:15px;
box-shadow:0 8px 20px rgba(0,0,0,.08);
}

.card h2{
margin-bottom:15px;
color:#0d6efd;
}

input,textarea{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:10px;
font-size:16px;
box-sizing:border-box;
}

button{
background:#0d6efd;
color:#fff;
padding:12px 20px;
border:none;
border-radius:10px;
cursor:pointer;
font-size:16px;
}

button:hover{
background:#084298;
}

</style>

</head>

<body>

<div class="header">
<i class="fa-solid fa-user-shield"></i>
TaxCore Admin Dashboard
</div>

<div class="container">

<div class="card">

<h2>Website Information</h2>

<input type="text" placeholder="Website Name">

<input type="text" placeholder="Phone Number">

<input type="text" placeholder="WhatsApp Number">

<input type="email" placeholder="Email Address">

<button>Save Changes</button>

</div>

<div class="card">

<h2>Homepage Banner</h2>

<input type="text" placeholder="Banner Title">

<textarea rows="4" placeholder="Banner Description"></textarea>

<button>Update Banner</button>

</div>

<div class="card">

<h2>Quick Links</h2>

<p>🏠 Home Page</p>

<p>💼 Services</p>

<p>📞 Contact</p>

<p>📜 Privacy Policy</p>

<p>📄 Terms & Conditions</p>

</div>

</div>

</body>
</html>
