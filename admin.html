<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MyTaxCore Admin Panel</title>

<link rel="stylesheet" href="style.css">
  <script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
import { getAuth } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyA98GfR8lxjHC8wx1_eoSYbjpSGhOFqrTA",
  authDomain: "mytaxcore.firebaseapp.com",
  projectId: "mytaxcore",
  storageBucket: "mytaxcore.firebasestorage.app",
  messagingSenderId: "984997488886",
  appId: "1:984997488886:web:55cc4d601daf38578064d7",
  measurementId: "G-0GYDME0TTY"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.firebaseAuth = auth;
  </script>

<style>

body{
background:#f4f7fb;
font-family:Arial,sans-serif;
}

.admin-box{
max-width:500px;
margin:80px auto;
background:#fff;
padding:30px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,.1);
}

.admin-box h2{
text-align:center;
color:#0d6efd;
margin-bottom:25px;
}

.admin-box input{
width:100%;
padding:14px;
margin:10px 0;
border:1px solid #ccc;
border-radius:10px;
font-size:16px;
box-sizing:border-box;
}

.admin-box button{
width:100%;
padding:14px;
background:#0d6efd;
color:#fff;
border:none;
border-radius:10px;
font-size:17px;
cursor:pointer;
margin-top:15px;
}

.admin-box button:hover{
background:#0b5ed7;
}

</style>

</head>

<body>

<div class="admin-box">

<h2>🔐 MyTaxCore Admin Login</h2>

<input type="email" id="email" placeholder="Enter Admin Email">

<input type="password" id="password" placeholder="Enter Password">

<button onclick="login()">
Login
</button>

</div>

<script>

async function login(){

import("https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js")
.then(({signInWithEmailAndPassword})=>{

let email = document.getElementById("email").value;
let password = document.getElementById("password").value;

signInWithEmailAndPassword(window.firebaseAuth,email,password)
.then((userCredential)=>{

alert("Login Successful");

window.location.href="dashboard.html";

})
.catch((error)=>{

alert("Wrong Email or Password");

});

});

}

</script>

</body>
</html>
